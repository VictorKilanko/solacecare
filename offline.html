<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SolaceCare Network — You're Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Lato', system-ui, sans-serif;
      background: #0D1E2E;
      color: #fff;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 2rem;
    }
    .wrap { max-width: 420px; }
    .logo {
      width: 72px; height: 72px; border-radius: 50%;
      border: 3px solid #4DA8B5;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 2rem;
    }
    .logo-cross {
      width: 28px; height: 28px; position: relative;
    }
    .logo-cross::before, .logo-cross::after {
      content: ''; position: absolute;
      background: #C9955A; border-radius: 2px;
    }
    .logo-cross::before { width: 3px; height: 100%; left: 50%; transform: translateX(-50%); }
    .logo-cross::after  { width: 100%; height: 3px; top: 50%; transform: translateY(-50%); }
    h1 {
      font-family: Georgia, serif;
      font-size: 1.6rem; font-weight: 700;
      color: #fff; margin-bottom: 1rem; line-height: 1.3;
    }
    p {
      font-size: 1rem; color: rgba(255,255,255,0.6);
      line-height: 1.75; margin-bottom: 2rem;
    }
    .phone {
      font-family: Georgia, serif;
      font-size: 1.8rem; font-weight: 700;
      color: #C9955A; letter-spacing: 0.06em;
      display: block; margin-bottom: 0.4rem;
    }
    .avail {
      font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(255,255,255,0.4); margin-bottom: 2rem; display: block;
    }
    a.btn {
      display: inline-block;
      background: #C9955A; color: #fff;
      padding: 0.9rem 2.4rem; border-radius: 4px;
      font-size: 0.9rem; font-weight: 700; letter-spacing: 0.07em;
      text-transform: uppercase; text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo"><div class="logo-cross"></div></div>
    <h1>We're still here,<br>even when the connection isn't.</h1>
    <p>It looks like you're offline. You can still reach us by phone — someone is available right now.</p>
    <a class="phone" href="tel:5029765223">502-9SO-LACE</a>
    <span class="avail">Available 24 hours · 7 days a week</span>
    <a class="btn" href="tel:5029765223">Call Now — It's Free</a>
  </div>
</body>
</html>
